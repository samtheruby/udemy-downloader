services:
  udemy-downloader:
    container_name: udemy-downloader
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./output:/app/out_dir:rw
      - ./keyfile.json:/app/keyfile.json:rw
      - ./wvkeys:/app/wvkeys:ro
      - ./cookies.txt:/app/cookies.txt:ro
    env_file:
      - .env
